name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python run_tests.py
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build ARM64 image
        run: docker buildx build --platform linux/arm64 -t proyectoembol_app:latest --load .
      - name: Save image
        run: docker save proyectoembol_app:latest -o proyectoembol_app.tar
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proyectoembol_app_image
          path: proyectoembol_app.tar

  integration:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: proyectoembol_app_image

      - name: Load image
        run: |
          TAR=$(find . -type f -name "*.tar" -print -quit)
          docker load -i "$TAR"

      - name: Setup CI Network
        run: docker network create ci_net || true

      - name: Start InfluxDB
        run: |
          docker run -d --name influx_ci --network ci_net -p 8086:8086 \
            -e DOCKER_INFLUXDB_INIT_MODE=setup \
            -e DOCKER_INFLUXDB_INIT_USERNAME=admin \
            -e DOCKER_INFLUXDB_INIT_PASSWORD=password123 \
            -e DOCKER_INFLUXDB_INIT_ORG=myorg \
            -e DOCKER_INFLUXDB_INIT_BUCKET=mybucket \
            -e DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=ci-token \
            influxdb:2.6

      - name: Wait for InfluxDB
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8086/health > /dev/null; then
              echo "InfluxDB is up"
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run Historian
        run: |
          docker run -d --name historian_ci --network ci_net \
            -v ${{ github.workspace }}/src/historian/tags.yaml:/app/src/historian/tags.yaml:ro \
            -e INFLUX_URL=http://influx_ci:8086 \
            -e INFLUX_TOKEN=ci-token \
            -e INFLUX_ORG=myorg \
            -e INFLUX_BUCKET=mybucket \
            -e MODBUS_HOST=mock \
            -e POLL_INTERVAL=1 \
            proyectoembol_app:latest

      - name: Wait and verify data
        run: |
          sleep 15
          echo "=== HISTORIAN LOGS ==="
          docker logs historian_ci || true
          echo ""
          echo "=== INFLUXDB LOGS ==="
          docker logs influx_ci || true
          echo ""
          
          QUERY='from(bucket:"mybucket") |> range(start:-10m) |> filter(fn:(r) => r._measurement=="historian_measurement") |> last()'
          
          curl -s -w "\n%{http_code}\n" -X POST "http://localhost:8086/api/v2/query?org=myorg" \
            -H "Authorization: Token ci-token" \
            -H "Content-type: application/vnd.flux" \
            --data "$QUERY" > /tmp/result.txt
          
          HTTP_CODE=$(tail -n1 /tmp/result.txt)
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Got HTTP $HTTP_CODE"
            cat /tmp/result.txt
            exit 1
          fi
          
          head -n-1 /tmp/result.txt
          echo ""
          
          python3 ci_verify.py

      - name: Cleanup
        if: always()
        run: |
          docker stop historian_ci influx_ci || true
          docker rm historian_ci influx_ci || true
          docker network rm ci_net || true