mappings:
  - tag: filled_weight
    submodel: Operativos
    collection: Pesada
    property: peso

  - tag: pack_count
    submodel: Operativos
    collection: Pesada
    property: cantidadPesadas

  - tag: cycle_count
    submodel: Operativos
    collection: Produccion
    property: cantidadLlenadas

  - tag: conveyor_running
    submodel: Operativos
    collection: Pesada
    property: estado

  - tag: pressure
    submodel: Operativos
    collection: Produccion
    property: consumoElectrico

  - tag: temperature
    submodel: Operativos
    collection: Produccion
    property: tiempoCicloActual

  - tag: emergency_stop
    submodel: Alarmas
    property: paradaEmergencia